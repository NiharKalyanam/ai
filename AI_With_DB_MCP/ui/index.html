<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IIQ Intelligence — Database AI</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c0f;
    --surface:  #111418;
    --card:     #161b22;
    --border:   #21262d;
    --accent:   #58a6ff;
    --accent2:  #3fb950;
    --warn:     #f85149;
    --muted:    #8b949e;
    --text:     #e6edf3;
    --mono:     'JetBrains Mono', monospace;
    --sans:     'Syne', sans-serif;
    --radius:   8px;
    --glow:     0 0 20px rgba(88,166,255,0.15);
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--mono); overflow: hidden; }

  /* ── Layout ── */
  .app { display: grid; grid-template-columns: 260px 1fr; grid-template-rows: 56px 1fr; height: 100vh; }

  /* ── Topbar ── */
  .topbar {
    grid-column: 1 / -1;
    display: flex; align-items: center; gap: 12px;
    padding: 0 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .topbar-logo { font-family: var(--sans); font-size: 16px; font-weight: 800; letter-spacing: -0.5px; color: var(--text); }
  .topbar-logo span { color: var(--accent); }
  .topbar-badge {
    font-size: 10px; font-weight: 500; letter-spacing: 1px; text-transform: uppercase;
    background: rgba(88,166,255,0.1); color: var(--accent); border: 1px solid rgba(88,166,255,0.3);
    padding: 2px 8px; border-radius: 20px;
  }
  .topbar-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent2); box-shadow: 0 0 6px var(--accent2); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── Sidebar ── */
  .sidebar {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .sidebar-section { padding: 16px 12px 8px; font-size: 10px; font-weight: 500; letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted); }

  .config-block { padding: 8px 12px; }
  .config-row { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
  .config-label { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; }
  .config-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 11px;
    padding: 6px 8px; border-radius: var(--radius); outline: none;
    transition: border-color .2s;
  }
  .config-input:focus { border-color: var(--accent); }
  .config-input::placeholder { color: var(--muted); }

  .samples-list { flex: 1; overflow-y: auto; padding: 0 8px 12px; }
  .sample-btn {
    width: 100%; text-align: left; background: none; border: 1px solid transparent;
    color: var(--muted); font-family: var(--mono); font-size: 11px; line-height: 1.5;
    padding: 7px 8px; border-radius: var(--radius); cursor: pointer;
    transition: all .15s; margin-bottom: 2px;
  }
  .sample-btn:hover { background: var(--card); border-color: var(--border); color: var(--text); }

  .sidebar-footer { padding: 12px; border-top: 1px solid var(--border); }
  .clear-btn {
    width: 100%; background: none; border: 1px solid var(--border);
    color: var(--muted); font-family: var(--mono); font-size: 11px;
    padding: 7px; border-radius: var(--radius); cursor: pointer; transition: all .15s;
  }
  .clear-btn:hover { border-color: var(--warn); color: var(--warn); }

  /* ── Main chat area ── */
  .chat-area { display: flex; flex-direction: column; overflow: hidden; }

  .messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 16px; }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* ── Message bubbles ── */
  .msg { display: flex; gap: 10px; max-width: 100%; animation: msgIn .2s ease; }
  @keyframes msgIn { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }

  .msg-avatar {
    width: 28px; height: 28px; border-radius: 6px; flex-shrink: 0; margin-top: 1px;
    display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600;
  }
  .msg.user .msg-avatar { background: rgba(88,166,255,0.15); color: var(--accent); border: 1px solid rgba(88,166,255,0.3); }
  .msg.bot  .msg-avatar { background: rgba(63,185,80,0.1);  color: var(--accent2); border: 1px solid rgba(63,185,80,0.3); }
  .msg.err  .msg-avatar { background: rgba(248,81,73,0.1);  color: var(--warn);    border: 1px solid rgba(248,81,73,0.3); }

  .msg-body { flex: 1; min-width: 0; }
  .msg-meta { font-size: 10px; color: var(--muted); margin-bottom: 4px; display: flex; gap: 8px; align-items: center; }
  .msg-meta .tag { background: var(--card); border: 1px solid var(--border); padding: 1px 6px; border-radius: 20px; font-size: 9px; letter-spacing: 0.5px; }

  .msg-text {
    background: var(--card); border: 1px solid var(--border); border-radius: 2px 8px 8px 8px;
    padding: 12px 14px; font-size: 12.5px; line-height: 1.7; color: var(--text);
    white-space: pre-wrap; word-break: break-word;
  }
  .msg.user .msg-text { background: rgba(88,166,255,0.06); border-color: rgba(88,166,255,0.2); border-radius: 8px 2px 8px 8px; }
  .msg.err  .msg-text { background: rgba(248,81,73,0.06); border-color: rgba(248,81,73,0.25); }

  /* Tables inside responses */
  .msg-text table { border-collapse: collapse; width: 100%; margin-top: 8px; font-size: 11px; }
  .msg-text th { background: rgba(88,166,255,0.1); color: var(--accent); padding: 5px 8px; text-align: left; border: 1px solid var(--border); font-weight: 500; }
  .msg-text td { padding: 4px 8px; border: 1px solid var(--border); color: var(--text); }
  .msg-text tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

  /* Code blocks inside responses */
  .msg-text code { background: rgba(0,0,0,0.4); color: #79c0ff; padding: 1px 5px; border-radius: 3px; font-size: 11px; }

  /* Thinking indicator */
  .thinking .msg-text { color: var(--muted); display: flex; align-items: center; gap: 6px; }
  .dots { display: flex; gap: 3px; }
  .dots span { width: 5px; height: 5px; border-radius: 50%; background: var(--muted); animation: dot .9s infinite; }
  .dots span:nth-child(2) { animation-delay: .15s; }
  .dots span:nth-child(3) { animation-delay: .3s; }
  @keyframes dot { 0%,100%{opacity:.25} 50%{opacity:1} }

  /* Welcome */
  .welcome {
    margin: auto; text-align: center; max-width: 440px;
    animation: msgIn .4s ease;
  }
  .welcome-icon { font-size: 36px; margin-bottom: 16px; }
  .welcome h2 { font-family: var(--sans); font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .welcome p { font-size: 12px; color: var(--muted); line-height: 1.7; margin-bottom: 20px; }
  .welcome-chips { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
  .chip {
    background: var(--card); border: 1px solid var(--border); color: var(--muted);
    font-family: var(--mono); font-size: 11px; padding: 5px 10px;
    border-radius: 20px; cursor: pointer; transition: all .15s;
  }
  .chip:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Input bar ── */
  .input-bar {
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .input-row { display: flex; gap: 8px; align-items: flex-end; }
  .input-wrap { flex: 1; position: relative; }
  textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.5;
    padding: 11px 14px; border-radius: var(--radius); outline: none;
    resize: none; min-height: 44px; max-height: 160px;
    transition: border-color .2s, box-shadow .2s;
    field-sizing: content;
  }
  textarea:focus { border-color: var(--accent); box-shadow: var(--glow); }
  textarea::placeholder { color: var(--muted); }

  .send-btn {
    height: 44px; width: 44px; border-radius: var(--radius); flex-shrink: 0;
    background: var(--accent); border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .15s; color: #0a0c0f;
  }
  .send-btn:hover:not(:disabled) { background: #79b8ff; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; opacity: .6; }
  .send-btn svg { width: 18px; height: 18px; }

  .input-hint { font-size: 10px; color: var(--muted); margin-top: 6px; letter-spacing: 0.3px; }
  .input-hint span { color: var(--accent); opacity: .7; }
</style>
</head>
<body>
<div class="app">

  <!-- Topbar -->
  <header class="topbar">
    <div class="topbar-logo">IIQ<span>.</span>AI</div>
    <div class="topbar-badge">MCP · Database Intelligence</div>
    <div class="topbar-status">
      <div class="status-dot"></div>
      <span id="status-text">connecting...</span>
    </div>
  </header>

  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-section">Connection</div>
    <div class="config-block">
      <div class="config-row">
        <label class="config-label">API URL</label>
        <input class="config-input" id="api-url" value="http://localhost:3344" placeholder="http://localhost:3344">
      </div>
      <div class="config-row">
        <label class="config-label">API Token</label>
        <input class="config-input" id="api-token" type="password" value="change-me-before-sharing" placeholder="your API token">
      </div>
    </div>

    <div class="sidebar-section">Sample Questions</div>
    <div class="samples-list" id="samples-list">
      <!-- populated by JS -->
    </div>

    <div class="sidebar-footer">
      <button class="clear-btn" onclick="clearChat()">Clear conversation</button>
    </div>
  </aside>

  <!-- Chat area -->
  <main class="chat-area">
    <div class="messages" id="messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon">⬡</div>
        <h2>IIQ Intelligence</h2>
        <p>Ask anything about your SailPoint IdentityIQ database in plain English. The AI generates SQL, queries your live DB, and explains the results.</p>
        <div class="welcome-chips" id="welcome-chips"></div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <div class="input-wrap">
          <textarea id="input" placeholder="Ask anything about your IIQ database..." rows="1"
            onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        </div>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send (Enter)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 2L11 13M22 2L15 22l-4-9-9-4 20-7z"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">Press <span>Enter</span> to send · <span>Shift+Enter</span> for new line</div>
    </div>
  </main>
</div>

<script>
const SAMPLES = [
  "How many identities are in the system?",
  "Show me all failed provisioning transactions",
  "Which users have not logged in for 90 days?",
  "List identities with no manager assigned",
  "What access does a specific user have?",
  "Show pending certifications",
  "How many provisioning tasks failed this week?",
  "Which roles are assigned the most?",
  "Show identities with more than 5 accounts",
  "List all inactive identities",
  "Show recent audit events",
  "Which applications have the most users?",
];

// Init
window.addEventListener('DOMContentLoaded', () => {
  renderSamples();
  checkHealth();
  document.getElementById('api-url').addEventListener('change', checkHealth);
  document.getElementById('api-token').addEventListener('change', checkHealth);
});

function renderSamples() {
  const list = document.getElementById('samples-list');
  const chips = document.getElementById('welcome-chips');
  SAMPLES.forEach((s, i) => {
    const btn = document.createElement('button');
    btn.className = 'sample-btn';
    btn.textContent = s;
    btn.onclick = () => ask(s);
    list.appendChild(btn);

    if (i < 4) {
      const chip = document.createElement('button');
      chip.className = 'chip';
      chip.textContent = s;
      chip.onclick = () => ask(s);
      chips.appendChild(chip);
    }
  });
}

// Health check
async function checkHealth() {
  const url = document.getElementById('api-url').value.trim();
  const statusEl = document.getElementById('status-text');
  const dot = document.querySelector('.status-dot');
  try {
    const r = await fetch(url + '/health');
    if (r.ok) {
      const d = await r.json();
      statusEl.textContent = `${d.db} · ${d.schema}`;
      dot.style.background = 'var(--accent2)';
      dot.style.boxShadow = '0 0 6px var(--accent2)';
    } else {
      throw new Error('unhealthy');
    }
  } catch {
    statusEl.textContent = 'disconnected — is HTTP server running?';
    dot.style.background = 'var(--warn)';
    dot.style.boxShadow = '0 0 6px var(--warn)';
  }
}

// Send message
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

async function sendMessage() {
  const input = document.getElementById('input');
  const question = input.value.trim();
  if (!question) return;
  input.value = ''; autoResize(input);
  await ask(question);
}

async function ask(question) {
  hideWelcome();
  appendMsg('user', 'You', question);
  const thinkId = appendThinking();
  setLoading(true);

  const url   = document.getElementById('api-url').value.trim();
  const token = document.getElementById('api-token').value.trim();

  try {
    const r = await fetch(url + '/api/ask', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ question }),
    });
    removeThinking(thinkId);

    if (r.status === 401) {
      appendMsg('err', 'Auth Error', 'Invalid API token. Update the token in the sidebar to match your server .env file.');
      return;
    }

    const data = await r.json();
    if (!r.ok) { appendMsg('err', 'Error', data.error || 'Server error'); return; }
    appendMsg(data.isError ? 'err' : 'bot', 'IIQ AI', data.answer || 'No results.');

  } catch (e) {
    removeThinking(thinkId);
    appendMsg('err', 'Connection Error', `Could not reach ${url}. Is the HTTP server running?\n\nStart it with: node src/http-server.js`);
  } finally {
    setLoading(false);
  }
}

// DOM helpers
function hideWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function appendMsg(type, label, text) {
  const el = document.createElement('div');
  el.className = `msg ${type}`;
  const avatar = type === 'user' ? 'NK' : type === 'err' ? '✕' : '⬡';
  const time = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const rendered = renderText(text);
  el.innerHTML = `
    <div class="msg-avatar">${avatar}</div>
    <div class="msg-body">
      <div class="msg-meta"><span>${label}</span><span class="tag">${time}</span></div>
      <div class="msg-text">${rendered}</div>
    </div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return el;
}

function appendThinking() {
  const id = 'think-' + Date.now();
  const el = document.createElement('div');
  el.className = 'msg bot thinking';
  el.id = id;
  el.innerHTML = `
    <div class="msg-avatar">⬡</div>
    <div class="msg-body">
      <div class="msg-meta"><span>IIQ AI</span></div>
      <div class="msg-text"><div class="dots"><span></span><span></span><span></span></div> Querying database...</div>
    </div>`;
  document.getElementById('messages').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'end' });
  return id;
}

function removeThinking(id) {
  document.getElementById(id)?.remove();
}

function setLoading(on) {
  document.getElementById('send-btn').disabled = on;
  document.getElementById('input').disabled = on;
}

function clearChat() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  checkHealth();
}

// Markdown table renderer
function renderText(text) {
  if (!text) return '';
  // Escape HTML first
  let safe = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

  // Render markdown tables
  const tableRegex = /(\|.+\|\n)((?:\|[-: ]+\|\n))((?:\|.+\|\n?)+)/gm;
  safe = safe.replace(tableRegex, (match, header, sep, body) => {
    const parseRow = r => r.trim().replace(/^\||\|$/g,'').split('|').map(c => c.trim());
    const headers = parseRow(header);
    const rows = body.trim().split('\n').map(parseRow);
    const ths = headers.map(h => `<th>${h}</th>`).join('');
    const trs = rows.map(r => `<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('');
    return `<table><thead><tr>${ths}</tr></thead><tbody>${trs}</tbody></table>`;
  });

  // Bold
  safe = safe.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
  // Inline code
  safe = safe.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Italic
  safe = safe.replace(/_(.+?)_/g, '<em>$1</em>');

  return safe;
}
</script>
</body>
</html>
